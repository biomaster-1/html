<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <header>
        <nav>
            <div class="container">
                <div class="logo">
                    <h1><a href="index.html">我的博客</a></h1>
                </div>
                <ul class="nav-links">
                    <li><a href="index.html">首页</a></li>
                    <li><a href="#about">关于</a></li>
                    <li><a href="#contact">联系</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- 英雄区域 -->
    <section class="hero">
        <div class="container">
            <h2>欢迎来到我的博客</h2>
            <p>分享我的学习和生活</p>
        </div>
    </section>

    <!-- 文章列表 -->
    <section class="posts">
        <div class="container">
            <h3>最新文章</h3>
            <div class="post-list" id="post-list">
                <!-- 文章列表将通过JavaScript动态生成 -->
            </div>
        </div>
    </section>

    <!-- 关于部分 -->
    <section id="about" class="about">
        <div class="container">
            <h3>关于我</h3>
            <p>我是一名热爱技术和写作的开发者，创建这个博客是为了分享我的学习心得和生活感悟。</p>
        </div>
    </section>

    <!-- 联系部分 -->
    <section id="contact" class="contact">
        <div class="container">
            <h3>联系我</h3>
            <p>如果你有任何问题或建议，欢迎联系我。</p>
        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <p>&copy; 2026 我的博客. 保留所有权利.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
